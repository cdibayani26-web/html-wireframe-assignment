<!DOCTYPE html>
<html lang="en">
<head>
    <title>Web Design</title>
</head>
<body>
    <h1>Contact Us</h1>

    <a href="index.html">Home</a> |
    <a href="contact.html">Contact</a>
    <hr>
    <h2>Contact Information</h2>
    <table border="1" cellspacing="3" cellpadding="5">
        <tr>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>
        <tr>
            <td>Support</td>
            <td>support@example.com</td>
            <td>123-456-7890</td>
        </tr>
        <tr>
            <td>Sales</td>
            <td>sales@example.com</td>
            <td>987-654-3210</td>
        </tr>
        <tr>
            <td>General Inquiry</td>
            <td>info@example.com</td>
            <td>555-555-5555</td>
        </tr>
    </table>
    <hr>
    <form>
    <h2><i>Please fill out the form below.</i></h2>
    <td>Name:</td>
    <td>
        <input type="text" name="name" id="name">
    </td>
    <br> <br>
    <td>Email:</td>
    <td>
        <input type="email" name="email" id="email">
    </td>
    <br> <br>
    <td>Phone:</td>
    <td><input type="number" name="number" id="number"></td>
    <br> <br>
    <td>Message:</td>
    <td>
        <textarea type="message" rows="6" cols="30"></textarea> 
    </td>
    <br> <br>
    <td>Favorite Topic:</td>
    <td>
        <input type="radio" name="topic">HTML 
        <input type="radio" name="topic">CSS 
        <input type="radio" name="topic">JavaScript
    </td> 
    <br><br>
    <hr>
    <input type="submit" value="Send">
    <input type="reset" value="Clear">
</form>
</body>
</html>
